name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Note: No "cache: gradle" here because you don't have gradle files

      - name: Compile Java File
        run: javac SalesChart.java

      - name: Run Java Program with Mock Input
        run: |
          java SalesChart <<EOF
          100
          200
          300
          400
          500
          EOF
